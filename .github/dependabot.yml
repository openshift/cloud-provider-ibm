# To get started with Dependabot version updates, you'll need to specify which
# package ecosystems to update and where the package manifests are located.
# Please see the documentation for all configuration options:
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  # ------------------------------------------------------------------------------------------------------------
  # Update the "github-actions" for each of the branches
  # ------------------------------------------------------------------------------------------------------------

  - package-ecosystem: "github-actions"
    directory: "/" # location of your .github/workflows directory
    schedule:
      interval: "cron"
      cronjob: "35 11 * * *" # Run at 11:35 UTC daily
    open-pull-requests-limit: 99
    labels:
      - "dependencies"
      - "github-actions"
      - "release-1.35"
    target-branch: "release-1.35"

  - package-ecosystem: "github-actions"
    directory: "/" # location of your .github/workflows directory
    schedule:
      interval: "cron"
      cronjob: "34 11 * * *" # Run at 11:34 UTC daily
    open-pull-requests-limit: 99
    labels:
      - "dependencies"
      - "github-actions"
      - "release-1.34"
    target-branch: "release-1.34"

